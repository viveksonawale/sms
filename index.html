<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Shri Sai Apartment" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shri Sai Apartment - Admin portal for managing society maintenance, payments, and owners." />
    <title>Shri Sai Apartment – Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS v3 Play CDN (handles all utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary:       '#f97316',
              'primary-hover': '#ea580c',
              'primary-tint':  'rgba(249, 115, 22, 0.1)',
              secondary:     '#637381',
              tertiary:      '#556EE6',
              neutral:       '#454f5b',
              background:    '#F9FAFB',
              surface:       '#FFFFFF',
              'dark-bg':     '#141a21',
              'dark-surface': '#1c252e',
              'dark-border': '#34334a',
              success:       '#22c55e',
              warning:       '#ffab00',
              danger:        '#ff5630',
              info:          '#00b8d9',
              'sidebar-bg':  '#1c252e',
              'sidebar-hover': 'rgba(255, 255, 255, 0.04)',
            },
            fontFamily: {
              sans: ['"Public Sans"', 'sans-serif'],
              mono: ['Courier New', 'monospace'],
            },
            keyframes: {
              shimmer: {
                from: { backgroundPosition: '-200% 0' },
                to:   { backgroundPosition: '200% 0' },
              },
            },
            animation: {
              shimmer: 'shimmer 1.5s linear infinite',
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
